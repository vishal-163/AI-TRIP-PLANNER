name: ai_trip_planner
description: "AI Trip Planner - A Flutter app that generates personalized travel itineraries using Gemini AI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_maps_flutter: ^2.5.3
  flutter_riverpod: ^2.5.1
  go_router: ^12.1.3
  json_annotation: ^4.8.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  pdf: ^3.10.4
  path_provider: ^2.1.1
  equatable: ^2.0.5
  intl: ^0.19.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  url_launcher: ^6.2.5
  flutter_markdown: ^0.6.18+2
  uuid: ^4.2.1
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.0.0
  flutter_email_sender: ^6.0.3
  share_plus: ^7.0.0
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env